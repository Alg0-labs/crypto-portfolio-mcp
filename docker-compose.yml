
version: '3.8'

# ============================================================================
# Services (Containers)
# ============================================================================
services:
  
  coinmarketcap-mcp:
   
    build: .                          
    image: coinmarketcap-mcp:latest   
    container_name: coinmarketcap-mcp 
   
    restart: unless-stopped
    
  
    # Multi-user remote MCP server: no MORALIS_API_KEY here — each user sends
    # their own key in the 'X-Moralis-Key' request header.
    environment:
      - MCP_TRANSPORT=http
      - PORT=8000
      - API_BASE_URL=${API_BASE_URL:-https://api.coinmarketcap.com/data-api/v3}
      - API_TIMEOUT=${API_TIMEOUT:-30}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    ports:
      - "8000:8000"  # MCP endpoint at http://localhost:8000/mcp

    volumes:
      - ./logs:/app/logs
    
   
    deploy:
      resources:
        limits:
          cpus: '1.0'      
          memory: 512M     
        reservations:
          cpus: '0.5'      
          memory: 256M     
